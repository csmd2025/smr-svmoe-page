<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 300" font-family="Inter,sans-serif">
  <defs>
    <linearGradient id="g-moe" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0891b2"/>
    </linearGradient>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 z" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Input -->
  <rect x="10" y="120" width="100" height="60" rx="8" fill="#f1f5f9" stroke="#cbd5e1"/>
  <text x="60" y="147" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="600">Volume</text>
  <text x="60" y="165" text-anchor="middle" font-size="11" fill="#64748b">tokens (N×d)</text>

  <!-- Arrow -->
  <line x1="115" y1="150" x2="150" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Attention block (unchanged) -->
  <rect x="155" y="105" width="130" height="90" rx="8" fill="#fff" stroke="#cbd5e1"/>
  <text x="220" y="132" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="600">Volume Attn</text>
  <text x="220" y="152" text-anchor="middle" font-size="11" fill="#64748b">(unchanged)</text>
  <text x="220" y="172" text-anchor="middle" font-size="10" fill="#94a3b8">self + cross</text>

  <!-- Arrow -->
  <line x1="290" y1="150" x2="325" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Router -->
  <rect x="330" y="110" width="90" height="80" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-dasharray="4 3"/>
  <text x="375" y="135" text-anchor="middle" font-size="12" fill="#2563eb" font-weight="600">Router</text>
  <text x="375" y="152" text-anchor="middle" font-size="10" fill="#64748b">2-layer MLP</text>
  <text x="375" y="170" text-anchor="middle" font-size="10" fill="#64748b">top-k = 2</text>

  <!-- Experts -->
  <g>
    <rect x="470" y="40" width="90" height="42" rx="6" fill="url(#g-moe)" opacity="0.9"/>
    <text x="515" y="66" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Expert 1</text>

    <rect x="470" y="95" width="90" height="42" rx="6" fill="url(#g-moe)" opacity="0.7"/>
    <text x="515" y="121" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Expert 2</text>

    <rect x="470" y="150" width="90" height="42" rx="6" fill="url(#g-moe)" opacity="0.55"/>
    <text x="515" y="176" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Expert 3</text>

    <rect x="470" y="205" width="90" height="42" rx="6" fill="url(#g-moe)" opacity="0.4"/>
    <text x="515" y="231" text-anchor="middle" font-size="12" fill="#fff" font-weight="600">Expert 4</text>
  </g>

  <!-- Router -> experts lines -->
  <line x1="420" y1="140" x2="470" y2="60" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="420" y1="145" x2="470" y2="115" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="420" y1="155" x2="470" y2="170" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="420" y1="160" x2="470" y2="225" stroke="#64748b" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Weighted sum -->
  <circle cx="620" cy="150" r="22" fill="#fff" stroke="#2563eb" stroke-width="2"/>
  <text x="620" y="156" text-anchor="middle" font-size="20" fill="#2563eb" font-weight="700">Σ</text>

  <line x1="560" y1="60" x2="600" y2="140" stroke="#64748b" stroke-width="1"/>
  <line x1="560" y1="115" x2="601" y2="146" stroke="#64748b" stroke-width="1"/>
  <line x1="560" y1="170" x2="601" y2="154" stroke="#64748b" stroke-width="1"/>
  <line x1="560" y1="225" x2="600" y2="160" stroke="#64748b" stroke-width="1"/>

  <!-- Arrow -->
  <line x1="645" y1="150" x2="685" y2="150" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="690" y="120" width="120" height="60" rx="8" fill="#ecfdf5" stroke="#10b981"/>
  <text x="750" y="147" text-anchor="middle" font-size="12" fill="#065f46" font-weight="600">Volume</text>
  <text x="750" y="165" text-anchor="middle" font-size="11" fill="#047857">features</text>

  <!-- Labels -->
  <text x="410" y="20" text-anchor="middle" font-size="12" fill="#1e293b" font-weight="700">Sparse Volume MoE FFN</text>
  <text x="410" y="280" text-anchor="middle" font-size="11" fill="#64748b">Replaces the dense FFN in each volume block. Surface branch unchanged.</text>
</svg>
